apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${{ values.name }}
  namespace: ${{ values.name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ${{ values.name }}
  template:
    metadata:
      labels:
        app: ${{ values.name }}
    spec:
      containers:
        - name: ${{ values.name }}
          image: ${{ values.name }}:latest
          imagePullPolicy: Never
          ports:
            - containerPort: ${{ values.port }}
          env:
            - name: PORT
              value: "${{ values.port }}"